<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – Manage Links</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="antialiased">
    <div class="min-h-screen">
        <nav class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto">
            <div class="flex items-center space-x-2">
                <span class="text-3xl">📊</span>
                <span class="text-white font-bold text-xl">Dashboard</span>
            </div>
            <div class="space-x-6">
                <a href="/" class="nav-link">Home</a>
                <a href="/dashboard" class="nav-link">Dashboard</a>
                <a href="/about" class="nav-link">About</a>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto px-4 py-8">
            <div class="glass-card p-6">
                <div class="flex flex-wrap justify-between items-center mb-6 gap-4">
                    <h2 class="text-2xl font-bold text-gray-800">All Your Links</h2>
                    <div class="flex gap-3">
                        <select id="categoryFilter" class="rounded-full px-4 py-2 border-gray-200 bg-white">
                            <option value="all">📂 All categories</option>
                        </select>
                        <button id="refreshBtn" class="btn-secondary bg-white/20 text-white">⟳ Refresh</button>
                    </div>
                </div>
                <div id="linksTable" class="overflow-x-auto"></div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="fixed inset-0 hidden items-center justify-center modal-overlay z-50">
        <div class="modal-content">
            <h3 class="text-2xl font-bold mb-4">✏️ Edit Link</h3>
            <input type="hidden" id="editSlug">
            <div class="mb-4">
                <label class="block font-medium mb-1">Original URL</label>
                <input type="url" id="editUrl" class="w-full">
            </div>
            <div class="mb-6">
                <label class="block font-medium mb-1">Category</label>
                <input type="text" id="editCategory" class="w-full">
            </div>
            <div class="flex justify-end gap-3">
                <button id="closeModal" class="px-4 py-2 bg-gray-200 rounded-full hover:bg-gray-300 transition">Cancel</button>
                <button id="saveEdit" class="btn-primary">Save changes</button>
            </div>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
