<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShortLink – Professional URL Shortener</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-gray-100">
    <div class="max-w-4xl mx-auto p-6">
        <nav class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-600">🔗 ShortLink</h1>
            <div class="space-x-4">
                <a href="/" class="text-gray-700 hover:text-indigo-600">Home</a>
                <a href="/dashboard" class="text-gray-700 hover:text-indigo-600">Dashboard</a>
                <a href="/about" class="text-gray-700 hover:text-indigo-600">About</a>
            </div>
        </nav>

        <div class="bg-white rounded-xl shadow-md p-6 mb-8">
            <h2 class="text-2xl font-semibold mb-4">Shorten a URL</h2>
            <form id="shortenForm">
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Long URL *</label>
                    <input type="url" id="url" required placeholder="https://example.com/very/long/url" class="w-full border rounded-lg p-2">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Custom slug (optional)</label>
                    <input type="text" id="customSlug" placeholder="my-custom-link" class="w-full border rounded-lg p-2">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Category</label>
                    <input type="text" id="category" placeholder="e.g., work, social, blog" class="w-full border rounded-lg p-2">
                </div>
                <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">Shorten</button>
            </form>
            <div id="result" class="mt-4 hidden"></div>
        </div>

        <div class="bg-white rounded-xl shadow-md p-6">
            <h2 class="text-2xl font-semibold mb-4">Recent Links</h2>
            <div id="recentLinks" class="space-y-2"></div>
        </div>
    </div>
    <script src="/script.js"></script>
</body>
</html>
